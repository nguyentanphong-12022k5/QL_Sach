<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quản Lý Nhà Xuất Bản - Admin</title>
<link rel="stylesheet" th:href="@{/css/style.css}" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="container">
    <header class="header fade-in">
        <h1><i class="fas fa-building"></i> Quản Lý Nhà Xuất Bản</h1>
        <nav class="nav">
            <a th:href="@{/admin/dashboard}" class="nav-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
            <button class="btn btn-primary" onclick="document.getElementById('addForm').style.display='block'">
                <i class="fas fa-plus"></i> Thêm NXB
            </button>
        </nav>
    </header>

    <main class="main fade-in">
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <div id="addForm" style="display: none; margin-bottom: 30px; padding: 20px; background: #f8fafc; border-radius: 16px;">
            <h3 style="margin-bottom: 20px;">Thêm Nhà Xuất Bản Mới</h3>
            <form th:action="@{/admin/nhaxuatban/save}" method="post">
                <div class="form-group">
                    <label>Tên NXB</label>
                    <input type="text" name="tenNhaXuatBan" class="form-control" required />
                </div>
                <div class="form-group">
                    <label>Địa Chỉ</label>
                    <input type="text" name="diaChi" class="form-control" />
                </div>
                <div class="form-group">
                    <label>Số Điện Thoại</label>
                    <input type="text" name="sdt" class="form-control" />
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu</button>
                    <button type="button" class="btn btn-outline" onclick="document.getElementById('addForm').style.display='none'">
                        <i class="fas fa-times"></i> Hủy
                    </button>
                </div>
            </form>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Mã NXB</th>
                        <th>Tên NXB</th>
                        <th>Địa Chỉ</th>
                        <th>SĐT</th>
                        <th>Trạng Thái</th>
                        <th>Thao Tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="nxb : ${nxbList}">
                        <td th:text="${nxb.id}">1</td>
                        <td th:text="${nxb.tenNhaXuatBan}">NXB Giáo dục</td>
                        <td th:text="${nxb.diaChi} ?: '--'">Hà Nội</td>
                        <td th:text="${nxb.sdt} ?: '--'">0123456789</td>
                        <td>
                            <span th:if="${nxb.trangThai == 1}" class="badge badge-success">Hoạt động</span>
                            <span th:unless="${nxb.trangThai == 1}" class="badge badge-danger">Khóa</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/nhaxuatban/edit/{id}(id=${nxb.id})}" class="btn btn-warning btn-sm">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/admin/nhaxuatban/delete/{id}(id=${nxb.id})}" class="btn btn-danger btn-sm" 
                               onclick="return confirm('Xóa NXB này?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${nxbList == null || nxbList.isEmpty()}">
                        <td colspan="6" style="text-align: center; padding: 40px;">Chưa có NXB nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
