<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${tacGia.id != null ? 'Sửa Tác Giả' : 'Thêm Tác Giả'}">Form Tác Giả</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="container">
    <header class="header fade-in">
        <h1><i class="fas fa-user-pen"></i> <span th:text="${tacGia.id != null ? 'Sửa Tác Giả' : 'Thêm Tác Giả'}"></span></h1>
        <nav class="nav">
            <a th:href="@{/admin/tacgia}" class="nav-link"><i class="fas fa-arrow-left"></i> Quay Lại</a>
        </nav>
    </header>

    <main class="main fade-in">
        <form th:action="@{/admin/tacgia/save}" method="post" th:object="${tacGia}">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group">
                <label><i class="fas fa-user"></i> Tên Tác Giả <span style="color: red;">*</span></label>
                <input type="text" th:field="*{tenTacGia}" class="form-control" placeholder="Nhập tên tác giả" required />
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-map-pin"></i> Quê Quán</label>
                <input type="text" th:field="*{queQuan}" class="form-control" placeholder="Nhập quê quán" />
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Năm Sinh</label>
                <input type="text" th:field="*{namSinh}" class="form-control" placeholder="Nhập năm sinh" />
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu</button>
                <a th:href="@{/admin/tacgia}" class="btn btn-outline"><i class="fas fa-times"></i> Hủy</a>
            </div>
        </form>
    </main>
</div>
</body>
</html>
