<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard - Thư Viện</title>
<link rel="stylesheet" th:href="@{/css/style.css}" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="container">
    <header class="header fade-in">
        <h1><i class="fas fa-tachometer-alt"></i> Admin Dashboard</h1>
        <nav class="nav">
            <a th:href="@{/}" class="nav-link"><i class="fas fa-home"></i> Trang Chủ</a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="nav-link"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </form>
        </nav>
    </header>

    <main class="main fade-in">
        <h2 style="margin-bottom: 30px;">Quản Lý Hệ Thống</h2>

        <div class="stats-grid">
            <a th:href="@{/admin/sach}" class="stat-card" style="text-decoration: none;">
                <div class="stat-icon"><i class="fas fa-book"></i></div>
                <h3 th:text="${totalSach}">0</h3>
                <p>Quản Lý Sách</p>
            </a>
            <a th:href="@{/admin/tacgia}" class="stat-card" style="text-decoration: none;">
                <div class="stat-icon"><i class="fas fa-user-pen"></i></div>
                <h3 th:text="${totalTacGia}">0</h3>
                <p>Quản Lý Tác Giả</p>
            </a>
            <a th:href="@{/admin/nhaxuatban}" class="stat-card" style="text-decoration: none;">
                <div class="stat-icon"><i class="fas fa-building"></i></div>
                <h3 th:text="${totalNXB}">0</h3>
                <p>Quản Lý NXB</p>
            </a>
            <a th:href="@{/admin/loaisach}" class="stat-card" style="text-decoration: none;">
                <div class="stat-icon"><i class="fas fa-tags"></i></div>
                <h3>-</h3>
                <p>Quản Lý Loại Sách</p>
            </a>
            <a th:href="@{/admin/kesach}" class="stat-card" style="text-decoration: none;">
                <div class="stat-icon"><i class="fas fa-map-pin"></i></div>
                <h3>-</h3>
                <p>Quản Lý Kệ Sách</p>
            </a>
            <a th:href="@{/admin/taikhoan}" class="stat-card" style="text-decoration: none;">
                <div class="stat-icon"><i class="fas fa-users-cog"></i></div>
                <h3 th:text="${totalTaiKhoan}">0</h3>
                <p>Quản Lý Tài Khoản</p>
            </a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Quản Lý Thư Viện. All rights reserved.</p>
    </footer>
</div>
</body>
</html>
