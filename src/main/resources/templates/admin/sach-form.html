<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title th:text="${sach.id != null ? 'Sửa Sách' : 'Thêm Sách Mới'}">Form Sách</title>
<link rel="stylesheet" th:href="@{/css/style.css}" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="container">
    <header class="header fade-in">
        <h1>
            <i class="fas fa-book"></i> 
            <span th:text="${sach.id != null ? 'Sửa Sách' : 'Thêm Sách Mới'}"></span>
        </h1>
        <nav class="nav">
            <a th:href="@{/admin/sach}" class="nav-link"><i class="fas fa-arrow-left"></i> Quay Lại</a>
            <a th:href="@{/admin/dashboard}" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        </nav>
    </header>

    <main class="main fade-in">
        <form th:action="@{/admin/sach/save}" method="post" th:object="${sach}" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group">
                <label><i class="fas fa-book"></i> Tên Sách <span style="color: red;">*</span></label>
                <input type="text" th:field="*{tenSach}" class="form-control" placeholder="Nhập tên sách" required />
            </div>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Tác Giả <span style="color: red;">*</span></label>
                <select th:field="*{tacGia.id}" class="form-control" required>
                    <option value="">-- Chọn tác giả --</option>
                    <option th:each="tg : ${tacGiaList}" th:value="${tg.id}" th:text="${tg.tenTacGia}"></option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-building"></i> Nhà Xuất Bản <span style="color: red;">*</span></label>
                <select th:field="*{nhaXuatBan.id}" class="form-control" required>
                    <option value="">-- Chọn NXB --</option>
                    <option th:each="nxb : ${nxbList}" th:value="${nxb.id}" th:text="${nxb.tenNhaXuatBan}"></option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> Loại Sách <span style="color: red;">*</span></label>
                <select th:field="*{loaiSach.id}" class="form-control" required>
                    <option value="">-- Chọn loại sách --</option>
                    <option th:each="ls : ${loaiSachList}" th:value="${ls.id}" th:text="${ls.tenLoaiSach}"></option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-map-pin"></i> Kệ Sách <span style="color: red;">*</span></label>
                <select th:field="*{keSach.id}" class="form-control" required>
                    <option value="">-- Chọn kệ sách --</option>
                    <option th:each="ks : ${keSachList}" th:value="${ks.id}" th:text="${ks.viTri}"></option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Năm Xuất Bản</label>
                <input type="number" th:field="*{namXB}" class="form-control" placeholder="Nhập năm xuất bản" min="1900" max="2026" />
            </div>

            <div class="form-group">
                <label><i class="fas fa-box"></i> Số Lượng</label>
                <input type="number" th:field="*{soLuong}" class="form-control" placeholder="Nhập số lượng" min="0" value="10" />
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> Giá Mượn (VNĐ/ngày) <span style="color: red;">*</span></label>
                <input type="number" th:field="*{giaMuon}" class="form-control" placeholder="Nhập giá mượn theo ngày (VD: 2000)" min="0" step="500" />
                <small style="color: #666;">Phí mượn sẽ được tính: Giá mượn × Số lượng × Số ngày mượn</small>
            </div>

            <div class="form-group">
                <label><i class="fas fa-image"></i> Ảnh Bìa</label>
                <input type="file" name="imageFile" class="form-control" accept="image/*" />
                <small style="color: #666;">
                    <span th:if="${sach.imageUrl != null}">Ảnh hiện tại: <span th:text="${sach.imageUrl}"></span></span>
                    <span th:unless="${sach.imageUrl != null}">Chưa có ảnh</span>
                </small>
            </div>

            <div class="form-group">
                <label><i class="fas fa-toggle-on"></i> Trạng Thái</label>
                <select th:field="*{trangThai}" class="form-control">
                    <option value="1">Còn sách</option>
                    <option value="0">Hết sách</option>
                </select>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu</button>
                <a th:href="@{/admin/sach}" class="btn btn-outline"><i class="fas fa-times"></i> Hủy</a>
            </div>
        </form>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Quản Lý Thư Viện. All rights reserved.</p>
    </footer>
</div>
</body>
</html>
