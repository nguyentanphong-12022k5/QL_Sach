<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quản Lý Sách - Admin</title>
<link rel="stylesheet" th:href="@{/css/style.css}" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="container">
    <header class="header fade-in">
        <h1><i class="fas fa-book"></i> Quản Lý Sách</h1>
        <nav class="nav">
            <a th:href="@{/admin/dashboard}" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a th:href="@{/}" class="nav-link"><i class="fas fa-home"></i> Trang Chủ</a>
            <a th:href="@{/admin/sach/add}" class="nav-link btn-success"><i class="fas fa-plus"></i> Thêm Sách</a>
        </nav>
    </header>

    <main class="main fade-in">
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Mã Sách</th>
                        <th>Tên Sách</th>
                        <th>Tác Giả</th>
                        <th>NXB</th>
                        <th>Loại</th>
                        <th>Số Lượng</th>
                        <th>Trạng Thái</th>
                        <th>Thao Tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${sachList}">
                        <td th:text="${s.id}">1</td>
                        <td th:text="${s.tenSach}">Tên sách</td>
                        <td th:text="${s.tacGia?.tenTacGia}">Tác giả</td>
                        <td th:text="${s.nhaXuatBan?.tenNhaXuatBan}">NXB</td>
                        <td th:text="${s.loaiSach?.tenLoaiSach}">Loại</td>
                        <td th:text="${s.soLuong}">10</td>
                        <td>
                            <span th:if="${s.trangThai == '1'}" class="badge badge-success">Còn sách</span>
                            <span th:unless="${s.trangThai == '1'}" class="badge badge-danger">Hết sách</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/sach/edit/{id}(id=${s.id})}" class="btn btn-warning btn-sm"><i class="fas fa-edit"></i></a>
                            <a th:href="@{/admin/sach/delete/{id}(id=${s.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Xóa sách này?')"><i class="fas fa-trash"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Quản Lý Thư Viện. All rights reserved.</p>
    </footer>
</div>
</body>
</html>
