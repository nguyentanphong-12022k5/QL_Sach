<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${taiKhoan.id != null ? 'Sửa Tài Khoản' : 'Thêm Tài Khoản'}">Form Tài Khoản</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="container">
    <header class="header fade-in">
        <h1><i class="fas fa-users-cog"></i> <span th:text="${taiKhoan.id != null ? 'Sửa Tài Khoản' : 'Thêm Tài Khoản'}"></span></h1>
        <nav class="nav">
            <a th:href="@{/admin/taikhoan}" class="nav-link"><i class="fas fa-arrow-left"></i> Quay Lại</a>
        </nav>
    </header>

    <main class="main fade-in">
        <form th:action="@{/admin/taikhoan/save}" method="post" th:object="${taiKhoan}">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username <span style="color: red;">*</span></label>
                <input type="text" th:field="*{username}" class="form-control" placeholder="Nhập username" required />
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password <span th:if="${taiKhoan.id == null}" style="color: red;">*</span></label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Nhập mật khẩu" />
                <small th:if="${taiKhoan.id != null}" style="color: #666;">Để trống nếu không đổi mật khẩu</small>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-user-circle"></i> Họ Tên</label>
                <input type="text" th:field="*{hoTen}" class="form-control" placeholder="Nhập họ tên" />
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="Nhập email" />
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Số Điện Thoại</label>
                <input type="text" th:field="*{soDienThoai}" class="form-control" placeholder="Nhập số điện thoại" />
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Địa Chỉ</label>
                <input type="text" th:field="*{diaChi}" class="form-control" placeholder="Nhập địa chỉ" />
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-user-tag"></i> Quyền <span style="color: red;">*</span></label>
                <select th:field="*{quyen}" class="form-control" required>
                    <option value="1">Admin</option>
                    <option value="2">Thủ thư</option>
                    <option value="3">Nhân viên</option>
                </select>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-toggle-on"></i> Trạng Thái</label>
                <select th:field="*{trangThai}" class="form-control">
                    <option value="1">Hoạt động</option>
                    <option value="0">Khóa</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu</button>
                <a th:href="@{/admin/taikhoan}" class="btn btn-outline"><i class="fas fa-times"></i> Hủy</a>
            </div>
        </form>
    </main>
</div>
</body>
</html>
