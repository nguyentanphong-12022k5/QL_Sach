<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${loaiSach.id != null ? 'Sửa Loại Sách' : 'Thêm Loại Sách'}">Form Loại Sách</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="container">
    <header class="header fade-in">
        <h1><i class="fas fa-tag"></i> <span th:text="${loaiSach.id != null ? 'Sửa Loại Sách' : 'Thêm Loại Sách'}"></span></h1>
        <nav class="nav">
            <a th:href="@{/admin/loaisach}" class="nav-link"><i class="fas fa-arrow-left"></i> Quay Lại</a>
        </nav>
    </header>

    <main class="main fade-in">
        <form th:action="@{/admin/loaisach/save}" method="post" th:object="${loaiSach}">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Tên Loại Sách <span style="color: red;">*</span></label>
                <input type="text" th:field="*{tenLoaiSach}" class="form-control" placeholder="Nhập tên loại sách" required />
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu</button>
                <a th:href="@{/admin/loaisach}" class="btn btn-outline"><i class="fas fa-times"></i> Hủy</a>
            </div>
        </form>
    </main>
</div>
</body>
</html>
