<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Trước Sách - Thư Viện</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .reserve-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .book-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #eee;
        }
        .book-summary img {
            width: 120px;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-calendar-check"></i> Đặt Trước Sách</h1>
            <nav class="nav">
                <a th:href="@{/}" class="nav-link"><i class="fas fa-home"></i> Trang Chủ</a>
                <a th:href="@{/sach}" class="nav-link"><i class="fas fa-book"></i> Danh Sách Sách</a>
            </nav>
        </header>

        <main class="main">
            <div class="reserve-container fade-in">
                <div class="book-summary">
                    <img th:src="@{${sach.imageUrl != null ? '/img/sach/' + sach.imageUrl : '/img/default-book.jpg'}}" alt="Sách">
                    <div>
                        <h2 th:text="${sach.tenSach}">Tên Sách</h2>
                        <p style="color: #7f8c8d; margin-top: 5px;">
                            <i class="fas fa-user"></i> <span th:text="${sach.tacGia}">Tác giả</span>
                        </p>
                        <p style="margin-top: 10px;">
                            <span th:if="${sach.soLuong > 0}" class="badge badge-success">Sẵn sàng</span>
                            <span th:unless="${sach.soLuong > 0}" class="badge badge-warning">Đang hết (Đặt vào danh sách chờ)</span>
                        </p>
                    </div>
                </div>

                <form th:action="@{/dat-truoc/submit}" method="POST">
                    <input type="hidden" name="sachId" th:value="${sach.id}">
                    <input type="hidden" name="docGiaId" th:value="${docGia.id}">

                    <div class="form-group">
                        <label for="readerName">Người đặt</label>
                        <input type="text" id="readerName" th:value="${docGia.hoTen}" class="form-control" readonly>
                    </div>

                    <div class="form-group">
                        <label for="ngayHen">Ngày hẹn đến lấy sách</label>
                        <input type="date" id="ngayHen" name="ngayHen" class="form-control" 
                               th:value="${today}" th:min="${today}" required>
                        <small style="color: #7f8c8d;">Vui lòng đến đúng ngày hẹn để nhận sách.</small>
                    </div>

                    <div class="form-group">
                        <label for="soLuong">Số lượng đặt trước</label>
                        <input type="number" id="soLuong" name="soLuong" class="form-control" 
                               min="1" th:max="${sach.soLuong > 0 ? sach.soLuong : 10}" value="1" required>
                        <small style="color: #7f8c8d;" th:if="${sach.soLuong > 0}">
                            Hiện còn <span th:text="${sach.soLuong}"></span> quyển trong kho.
                        </small>
                        <small style="color: #e67e22;" th:unless="${sach.soLuong > 0}">
                            Sách đang hết, bạn sẽ được đưa vào danh sách chờ.
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="ghiChu">Ghi chú thêm (nếu có)</label>
                        <textarea id="ghiChu" name="ghiChu" class="form-control" rows="3" placeholder="Ví dụ: Tôi sẽ đến vào buổi sáng..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-submit">
                        <i class="fas fa-check-circle"></i> Xác nhận Đặt trước
                    </button>
                    <a th:href="@{'/sach/' + ${sach.id}}" class="btn btn-outline" style="width: 100%; text-align: center; margin-top: 10px;">
                        Hủy bỏ
                    </a>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
