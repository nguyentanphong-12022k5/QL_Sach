<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Danh Sách Phiếu Nhập - Thư Viện</title>
<link rel="stylesheet" th:href="@{/css/style.css}" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
<div class="container">
    <header class="header fade-in">
        <h1><i class="fas fa-truck"></i> Danh Sách Phiếu Nhập</h1>
        <nav class="nav">
            <a th:href="@{/}" class="nav-link"><i class="fas fa-home"></i> Trang Chủ</a>
            <a th:href="@{/sach}" class="nav-link"><i class="fas fa-book"></i> Sách</a>
            <a th:href="@{/docgia}" class="nav-link"><i class="fas fa-users"></i> Độc Giả</a>
            <a th:href="@{/phieumuon}" class="nav-link"><i class="fas fa-hand-holding"></i> Phiếu Mượn</a>
            <a th:href="@{/thongke}" class="nav-link"><i class="fas fa-chart-bar"></i> Thống Kê</a>
            <a th:href="@{/dien-dan}" class="nav-link"><i class="fas fa-comments"></i> Diễn Đàn</a>
        </nav>
    </header>

    <main class="main fade-in">
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <div sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_THUTHU', 'ROLE_NHANVIEN')" style="margin-bottom: 20px; text-align: right;">
            <a th:href="@{/phieunhap/add}" class="btn btn-success">
                <i class="fas fa-plus"></i> Tạo Phiếu Nhập
            </a>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Mã PN</th>
                        <th>Ngày Nhập</th>
                        <th sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_THUTHU', 'ROLE_NHANVIEN')">Nhà Cung Cấp</th>
                        <th sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_THUTHU', 'ROLE_NHANVIEN')">Ghi Chú</th>
                        <th>Thao Tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pn : ${phieuNhapList}">
                        <td th:text="${pn.id}">1</td>
                        <td th:text="${#temporals.format(pn.ngayNhap, 'dd/MM/yyyy')}">01/01/2026</td>
                        <td sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_THUTHU', 'ROLE_NHANVIEN')" th:text="${pn.nhaCungCap} ?: '--'">Công ty ABC</td>
                        <td sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_THUTHU', 'ROLE_NHANVIEN')" th:text="${pn.ghiChu} ?: '--'">Nhập sách mới</td>
                        <td>
                            <a th:href="@{/phieunhap/view/{id}(id=${pn.id})}" class="btn btn-outline btn-sm" title="Xem chi tiết">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a sec:authorize="hasAnyAuthority('ROLE_ADMIN', 'ROLE_THUTHU', 'ROLE_NHANVIEN')" th:href="@{/phieunhap/delete/{id}(id=${pn.id})}" class="btn btn-danger btn-sm" 
                               onclick="return confirm('Xóa phiếu nhập này?')" title="Xóa">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${phieuNhapList == null || phieuNhapList.isEmpty()}">
                        <td colspan="5" style="text-align: center; padding: 40px;">
                            <i class="fas fa-box-open" style="font-size: 3rem; color: var(--gray-color); margin-bottom: 15px;"></i>
                            <p>Chưa có phiếu nhập nào.</p>
                            <a th:href="@{/phieunhap/add}" class="btn btn-primary" style="margin-top: 15px;">
                                <i class="fas fa-plus"></i> Tạo phiếu nhập đầu tiên
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Quản Lý Thư Viện. All rights reserved.</p>
    </footer>
</div>
</body>
</html>
