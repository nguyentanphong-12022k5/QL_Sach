<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - Thư Viện</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-key"></i>
                <h2>Quên Mật Khẩu</h2>
                <p>Nhập email để nhận link đặt lại mật khẩu</p>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}">Lỗi</span>
            </div>

            <div th:if="${message}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:utext="${message}">Thông báo</span>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" name="email" placeholder="Nhập email đã đăng ký" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-paper-plane"></i> Gửi Yêu Cầu
                </button>
            </form>

            <div class="auth-footer">
                <p><a th:href="@{/login}"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a></p>
            </div>
        </div>
    </div>
</body>
</html>
