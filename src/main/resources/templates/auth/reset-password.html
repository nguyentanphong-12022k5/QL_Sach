<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lại Mật Khẩu - Thư Viện</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-lock"></i>
                <h2>Đặt Lại Mật Khẩu</h2>
                <p>Nhập mật khẩu mới</p>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}">Lỗi</span>
            </div>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}">

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Mật khẩu mới</label>
                    <input type="password" name="password" placeholder="Nhập mật khẩu mới" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Xác nhận mật khẩu</label>
                    <input type="password" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-save"></i> Đặt Lại Mật Khẩu
                </button>
            </form>
        </div>
    </div>
</body>
</html>
