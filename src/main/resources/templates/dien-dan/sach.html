<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="'Bình luận: ' + ${sach.tenSach}">Bình luận sách</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.header {
    background: white;
    padding: 15px 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-bottom: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1001;
    border-radius: 0 0 20px 20px;
}
.nav {
    display: flex;
    gap: 15px;
}
.nav-link:hover {
    color: white !important;
    background: var(--primary-color) !important;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
}
.binh-luan-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}
.binh-luan-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
}
.binh-luan-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
}
.binh-luan-info {
    flex: 1;
}
.binh-luan-name {
    font-weight: 600;
    color: var(--dark-color);
}
.binh-luan-time {
    font-size: 0.85rem;
    color: var(--gray-color);
}
.binh-luan-content {
    padding: 10px 0 10px 65px;
    line-height: 1.6;
}
.form-binh-luan {
    background: white;
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}
.form-binh-luan textarea {
    width: 100%;
    padding: 15px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    resize: vertical;
    min-height: 100px;
    margin-bottom: 15px;
}
.star-rating {
    display: flex;
    flex-direction: row-reverse;
    gap: 5px;
    justify-content: flex-end;
}
.star-rating input {
    display: none;
}
.star-rating label {
    cursor: pointer;
    font-size: 1.5rem;
    color: #ddd;
    transition: color 0.2s;
}
.star-rating label:hover,
.star-rating label:hover ~ label,
.star-rating input:checked ~ label {
    color: #ffc107;
}
.stars-display {
    color: #ffc107;
    font-size: 0.9rem;
}
.stars-display .far {
    color: #ddd;
}
.book-rating-large {
    color: #ffc107;
    font-size: 1.2rem;
    margin-top: 5px;
}
</style>
</head>
<body>
<div class="container">
    <header class="header fade-in">
        <h1><i class="fas fa-comments"></i> Bình luận sách</h1>
        <nav class="nav">
            <a th:href="@{/dien-dan}" class="nav-link"><i class="fas fa-arrow-left"></i> Diễn Đàn</a>
            <a th:href="@{/sach/{id}(id=${sach.id})}" class="nav-link"><i class="fas fa-book"></i> Chi tiết sách</a>
        </nav>
    </header>

    <main class="main fade-in">
        <div th:if="${success}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <!-- Thông tin sách -->
        <div style="display: flex; gap: 20px; margin-bottom: 30px; padding: 20px; background: #f8fafc; border-radius: 16px;">
            <img th:src="@{${sach.imageUrl != null ? '/img/sach/' + sach.imageUrl : '/img/default-book.jpg'}}" 
                 alt="Ảnh sách" style="width: 100px; height: 140px; object-fit: cover; border-radius: 8px;" />
            <div>
                <h2 th:text="${sach.tenSach}" style="margin-bottom: 10px;"></h2>
                <p><i class="fas fa-user"></i> <span th:text="${sach.tacGia?.tenTacGia}"></span></p>
                <div class="book-rating-large" th:if="${sach.ratingCount > 0}">
                    <span th:each="i : ${#numbers.sequence(1, 5)}">
                        <i th:class="${i <= sach.averageRating ? 'fas fa-star' : (i - 0.5 <= sach.averageRating ? 'fas fa-star-half-alt' : 'far fa-star')}"></i>
                    </span>
                    <span style="color: var(--gray-color); font-size: 0.9rem; margin-left: 10px;" 
                          th:text="${#numbers.formatDecimal(sach.averageRating, 1, 1)} + ' (' + ${sach.ratingCount} + ' đánh giá)'"></span>
                </div>
                <p th:if="${sach.ratingCount == 0}" style="color: var(--gray-color); font-size: 0.9rem; margin-top: 5px;">Chưa có đánh giá</p>
                <p style="margin-top: 5px;"><i class="fas fa-comment"></i> <span th:text="${soBinhLuan}"></span> bình luận</p>
            </div>
        </div>

        <!-- Form bình luận -->
        <div class="form-binh-luan">
            <h3 style="margin-bottom: 15px;"><i class="fas fa-pen"></i> Viết bình luận</h3>
            <form th:action="@{/dien-dan/dang}" method="post">
                <input type="hidden" name="sachId" th:value="${sach.id}" />
                <textarea name="noiDung" placeholder="Chia sẻ cảm nhận của bạn về cuốn sách này..." required></textarea>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span style="font-weight: 500;">Đánh giá của bạn:</span>
                        <div class="star-rating">
                            <input type="radio" id="star5" name="soSao" value="5" /><label for="star5" title="5 sao"><i class="fas fa-star"></i></label>
                            <input type="radio" id="star4" name="soSao" value="4" /><label for="star4" title="4 sao"><i class="fas fa-star"></i></label>
                            <input type="radio" id="star3" name="soSao" value="3" /><label for="star3" title="3 sao"><i class="fas fa-star"></i></label>
                            <input type="radio" id="star2" name="soSao" value="2" /><label for="star2" title="2 sao"><i class="fas fa-star"></i></label>
                            <input type="radio" id="star1" name="soSao" value="1" required /><label for="star1" title="1 sao"><i class="fas fa-star"></i></label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Gửi bình luận & Đánh giá
                    </button>
                </div>
            </form>
        </div>

        <!-- Danh sách bình luận -->
        <h3 style="margin-bottom: 20px;">
            <i class="fas fa-list"></i> <span th:text="${soBinhLuan}"></span> bình luận
        </h3>

        <div th:if="${binhLuanList == null || binhLuanList.isEmpty()}">
            <div class="binh-luan-card" style="text-align: center; padding: 40px;">
                <i class="fas fa-comment-dots" style="font-size: 3rem; color: var(--gray-color); margin-bottom: 15px;"></i>
                <p>Chưa có bình luận nào. Hãy là người đầu tiên bình luận!</p>
            </div>
        </div>

        <div th:each="bl : ${binhLuanList}" class="binh-luan-card">
            <div class="binh-luan-header">
                <img th:src="@{${bl.taiKhoan.avatar} ?: 'https://ui-avatars.com/api/?name=' + ${bl.taiKhoan.hoTen} + '&background=1877f2&color=fff&size=50'}"
                     alt="Avatar" class="binh-luan-avatar">
                <div class="binh-luan-info">
                    <div class="binh-luan-name">
                        <span th:text="${bl.taiKhoan.hoTen} ?: ${bl.taiKhoan.username}"></span>
                    </div>
                    <div class="binh-luan-time">
                        <i class="far fa-clock"></i>
                        <span th:text="${#temporals.format(bl.ngayDang, 'dd/MM/yyyy HH:mm')}"></span>
                        <span th:if="${bl.soSao != null}" style="margin-left: 10px;" class="stars-display">
                            <span th:each="i : ${#numbers.sequence(1, 5)}">
                                <i th:class="${i <= bl.soSao ? 'fas fa-star' : 'far fa-star'}"></i>
                            </span>
                        </span>
                    </div>
                </div>
                <a th:if="${currentUser?.id == bl.taiKhoan.id || currentUser?.quyen == 1}"
                   th:href="@{/dien-dan/xoa/{id}(id=${bl.id})}" 
                   style="color: var(--danger-color);"
                   onclick="return confirm('Xóa bình luận này?')">
                    <i class="fas fa-trash"></i>
                </a>
            </div>
            <div class="binh-luan-content" th:text="${bl.noiDung}"></div>
        </div>
    </main>
</div>
</body>
</html>
