<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/main-layout}">
<head>
<title>Quản trị bình luận - Admin</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div layout:fragment="content">
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="fas fa-comments me-2"></i>Quản trị bình luận</h2>
                <a href="/dien-dan" class="btn btn-outline-primary">
                    <i class="fas fa-arrow-left me-2"></i>Về diễn đàn
                </a>
            </div>

            <!-- Thông báo -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Bảng bình luận -->
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Danh sách tất cả bình luận</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th width="5%">ID</th>
                                    <th width="15%">Người dùng</th>
                                    <th width="35%">Nội dung</th>
                                    <th width="10%">Loại</th>
                                    <th width="10%">Trạng thái</th>
                                    <th width="15%">Ngày đăng</th>
                                    <th width="10%">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="bl : ${binhLuanList}">
                                    <td th:text="${bl.id}">1</td>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <!-- === SỬA: Dùng avatar từ tài khoản === -->
                                            <img th:if="${bl.taiKhoan.avatar != null && !bl.taiKhoan.avatar.isEmpty()}"
                                                 th:src="@{${bl.taiKhoan.avatar}}"
                                                 class="rounded-circle me-2" 
                                                 width="32" 
                                                 height="32"
                                                 onerror="this.src='https://ui-avatars.com/api/?name=' + encodeURIComponent(this.getAttribute('data-name')) + '&background=6c757d&color=fff&size=32'"
                                                 th:attr="data-name=${bl.taiKhoan.hoTen != null ? bl.taiKhoan.hoTen : bl.taiKhoan.username}">
                                            
                                            <img th:unless="${bl.taiKhoan.avatar != null && !bl.taiKhoan.avatar.isEmpty()}"
                                                 th:src="@{'https://ui-avatars.com/api/?name=' + (bl.taiKhoan.hoTen != null ? bl.taiKhoan.hoTen : bl.taiKhoan.username) + '&background=6c757d&color=fff&size=32'}"
                                                 class="rounded-circle me-2" 
                                                 width="32" 
                                                 height="32">
                                            
                                            <div>
                                                <div th:text="${bl.taiKhoan.hoTen} ?: bl.taiKhoan.username">Username</div>
                                                <small class="text-muted" th:text="${bl.taiKhoan.username}"></small>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <div style="max-width: 300px;">
                                            <p class="mb-1" th:text="${bl.noiDung}">Nội dung bình luận</p>
                                            <small class="text-primary" th:if="${bl.sach != null}">
                                                <i class="fas fa-book me-1"></i>
                                                <span th:text="${bl.sach.tenSach}">Tên sách</span>
                                            </small>
                                        </div>
                                    </td>
                                    <td>
                                        <span th:if="${bl.loai == 'GOP_Y'}" class="badge bg-info">Góp ý chung</span>
                                        <span th:if="${bl.loai == 'SACH'}" class="badge bg-warning">Bình luận sách</span>
                                    </td>
                                    <td>
                                        <span th:if="${bl.trangThai == 1}" class="badge bg-success">Hiển thị</span>
                                        <span th:if="${bl.trangThai == 0}" class="badge bg-secondary">Ẩn</span>
                                        <span th:if="${bl.trangThai == 2}" class="badge bg-danger">Đã thu hồi</span>
                                    </td>
                                    <td>
                                        <small th:text="${#temporals.format(bl.ngayDang, 'dd/MM/yyyy HH:mm')}">01/01/2024</small>
                                    </td>
                                    <td>
                                        <div class="btn-group btn-group-sm">
                                            <a th:href="@{/dien-dan/admin/toggle/{id}(id=${bl.id})}" 
                                               class="btn btn-outline-warning" 
                                               th:title="${bl.trangThai == 1} ? 'Ẩn bình luận' : 'Hiển thị bình luận'">
                                                <i th:class="${bl.trangThai == 1} ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                            </a>
                                            <a th:if="${bl.trangThai == 2}" 
                                               th:href="@{/dien-dan/khoi-phuc/{id}(id=${bl.id})}" 
                                               class="btn btn-outline-success" 
                                               title="Khôi phục bình luận">
                                                <i class="fas fa-undo-alt"></i>
                                            </a>
                                            <a th:href="@{/dien-dan/xoa-vinh-vien/{id}(id=${bl.id})}" 
                                               class="btn btn-outline-danger" 
                                               title="Xóa vĩnh viễn"
                                               onclick="return confirm('Bạn có chắc muốn xóa vĩnh viễn bình luận này?')">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${binhLuanList == null || binhLuanList.isEmpty()}">
                                    <td colspan="7" class="text-center py-4 text-muted">
                                        <i class="fas fa-comment-slash fa-2x mb-2 d-block"></i>
                                        Chưa có bình luận nào
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer">
                    <small class="text-muted">
                        Tổng số: <span th:text="${binhLuanList != null ? binhLuanList.size() : 0}">0</span> bình luận
                    </small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
