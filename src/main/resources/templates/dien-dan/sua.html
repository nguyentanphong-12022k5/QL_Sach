<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chỉnh Sửa Bình Luận - Thư Viện</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.header {
    background: white;
    padding: 15px 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-bottom: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1001;
    border-radius: 0 0 20px 20px;
}
.nav-link:hover {
    color: white !important;
    background: var(--primary-color) !important;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
}
.edit-container {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}
.edit-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 2px solid #f0f0f0;
}
.edit-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
}
.edit-info {
    flex: 1;
}
.edit-name {
    font-weight: 600;
    color: var(--dark-color);
}
.edit-time {
    font-size: 0.85rem;
    color: var(--gray-color);
}
.edit-content-old {
    background: #f8fafc;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    color: var(--gray-color);
}
.edit-content-old i {
    margin-right: 10px;
    color: var(--primary-color);
}
.star-rating {
    display: flex;
    flex-direction: row-reverse;
    gap: 5px;
    justify-content: flex-start;
    margin-top: 10px;
}
.star-rating input {
    display: none;
}
.star-rating label {
    cursor: pointer;
    font-size: 1.5rem;
    color: #ddd;
    transition: color 0.2s;
}
.star-rating label:hover,
.star-rating label:hover ~ label,
.star-rating input:checked ~ label {
    color: #ffc107;
}
</style>
</head>
<body>
<div class="container">
    <header class="header fade-in">
        <h1><i class="fas fa-edit"></i> Chỉnh Sửa Bình Luận</h1>
        <nav class="nav">
            <a th:href="@{/dien-dan}" class="nav-link"><i class="fas fa-arrow-left"></i> Quay Lại</a>
        </nav>
    </header>

    <main class="main fade-in">
        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <div class="edit-container">
            <div class="edit-header">
                <img th:src="@{${binhLuan.taiKhoan.avatar} ?: 'https://ui-avatars.com/api/?name=' + ${binhLuan.taiKhoan.hoTen} + '&background=1877f2&color=fff&size=50'}"
                     alt="Avatar" class="edit-avatar">
                <div class="edit-info">
                    <div class="edit-name" th:text="${binhLuan.taiKhoan.hoTen} ?: ${binhLuan.taiKhoan.username}"></div>
                    <div class="edit-time">
                        <i class="far fa-clock"></i>
                        <span th:text="${#temporals.format(binhLuan.ngayDang, 'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                </div>
            </div>

            <div class="edit-content-old">
                <i class="fas fa-quote-left"></i>
                <span th:text="${binhLuan.noiDung}"></span>
            </div>

            <form th:action="@{/dien-dan/cap-nhat/{id}(id=${binhLuan.id})}" method="post">
                <div class="form-group">
                    <label><i class="fas fa-pen"></i> Chỉnh sửa nội dung</label>
                    <textarea name="noiDung" class="form-control" rows="5" required th:text="${binhLuan.noiDung}"></textarea>
                </div>

                <div class="form-group" th:if="${binhLuan.sach != null}" style="margin-top: 20px;">
                    <label><i class="fas fa-star"></i> Chỉnh sửa đánh giá</label>
                    <div class="star-rating">
                        <input type="radio" id="star5" name="soSao" value="5" th:checked="${binhLuan.soSao == 5}" /><label for="star5" title="5 sao"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star4" name="soSao" value="4" th:checked="${binhLuan.soSao == 4}" /><label for="star4" title="4 sao"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star3" name="soSao" value="3" th:checked="${binhLuan.soSao == 3}" /><label for="star3" title="3 sao"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star2" name="soSao" value="2" th:checked="${binhLuan.soSao == 2}" /><label for="star2" title="2 sao"><i class="fas fa-star"></i></label>
                        <input type="radio" id="star1" name="soSao" value="1" th:checked="${binhLuan.soSao == 1}" /><label for="star1" title="1 sao"><i class="fas fa-star"></i></label>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Cập Nhật
                    </button>
                    <a th:href="@{/dien-dan}" class="btn btn-outline">
                        <i class="fas fa-times"></i> Hủy
                    </a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
